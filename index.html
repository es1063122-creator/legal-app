<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>동진이 - 안전관리 AI 어시스턴트</title>
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&family=Gmarket+Sans:wght@300;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --orange: #ea580c;
      --navy: #0b1b3b;
      --bg: #f8fafc;
      --panel: #ffffff;
      --text: #1e293b;
      --muted: #64748b;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Nanum Gothic', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    /* ── 채팅 패널 ── */
    .chat-panel {
      width: 100vw;
      height: 100vh;
      background: var(--panel);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── 탭 ── */
    .law-tabs {
      display: flex;
      overflow-x: auto;
      background: #f8fafc;
      border-bottom: 1px solid #e5e7eb;
      flex-shrink: 0;
      padding: 0 6px;
    }
    .law-tabs::-webkit-scrollbar { height: 0; }
    .law-tab {
      padding: 10px 13px;
      font-size: 0.74rem;
      font-weight: 900;
      white-space: nowrap;
      cursor: pointer;
      color: var(--muted);
      border: none;
      border-bottom: 2px solid transparent;
      background: none;
      transition: all 0.15s;
      font-family: 'Nanum Gothic', sans-serif;
    }
    .law-tab:hover { color: var(--orange); }
    .law-tab.active { color: var(--orange); border-bottom-color: var(--orange); }

    /* ── 메시지 영역 ── */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: #f8fafc;
      scroll-behavior: smooth;
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }

    .msg { display:flex; gap: 10px; align-items:flex-end; }
    .msg.user { flex-direction: row-reverse; }

    .msg-avatar {
      background: none;
      box-shadow: none;
      width: 70px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      flex-shrink: 0;
    }
    .msg-avatar img {
      width: 80px;
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 6px 10px rgba(0,0,0,.20));
      transition: transform .2s ease;
    }
    .msg.bot .msg-avatar img { transform: scale(1.05); }
    .msg.user .msg-avatar {
      width: 36px; height: 36px;
      border-radius: 12px;
      background: #e5e7eb;
      color: #111827;
      font-size: 0.95rem;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .msg-content { max-width: 80%; display:flex; flex-direction:column; gap: 5px; }
    .msg.user .msg-content { align-items: flex-end; }
    .msg-name { font-size: 0.70rem; font-weight: 900; color: #6b7280; }

    .msg-bubble {
      position: relative;
      padding: 12px 14px;
      border-radius: 16px;
      font-size: 0.90rem;
      line-height: 1.65;
      word-break: keep-all;
      box-shadow: 0 10px 22px rgba(0,0,0,0.06);
    }
    .msg.bot .msg-bubble {
      background: #ffffff;
      color: var(--text);
      border-bottom-left-radius: 4px;
      border: 1px solid rgba(15,23,42,0.06);
    }
    .msg.bot .msg-bubble::after {
      content: "";
      position: absolute;
      left: -10px; top: 18px;
      border-width: 8px;
      border-style: solid;
      border-color: transparent #ffffff transparent transparent;
    }
    .msg.user .msg-bubble {
      background: linear-gradient(135deg, #c2410c, #ea580c);
      color: #fff;
      border-bottom-right-radius: 4px;
      box-shadow: 0 12px 24px rgba(234,88,12,0.20);
    }
    .msg.user .msg-bubble::after {
      content: "";
      position: absolute;
      right: -10px; top: 18px;
      border-width: 8px;
      border-style: solid;
      border-color: transparent transparent transparent #ea580c;
    }
    .msg-time { font-size: 0.68rem; color: #9ca3af; padding: 0 4px; font-weight: 800; }

    /* ── 법령 카드 ── */
    .law-cards { display:flex; flex-direction:column; gap: 8px; margin-top: 8px; }
    .law-card {
      background: #fff;
      border: 1px solid #fed7aa;
      border-left: 4px solid var(--orange);
      border-radius: 12px;
      padding: 10px 12px;
    }
    .law-card-badge {
      display: inline-block;
      background: rgba(234,88,12,0.10);
      color: var(--orange);
      font-size: 0.70rem;
      font-weight: 900;
      padding: 2px 8px;
      border-radius: 999px;
      margin-bottom: 6px;
    }
    .law-card-title { font-size: 0.82rem; font-weight: 900; color: #1e293b; margin-bottom: 4px; }
    .law-card-desc { font-size: 0.78rem; color: #64748b; line-height: 1.5; margin-bottom: 6px; }
    .law-card-link {
      font-size: 0.75rem;
      color: var(--orange);
      font-weight: 900;
      text-decoration: none;
    }

    /* ── 사진 분석 버튼 ── */
    .photo-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: #fff7ed;
      border-top: 1px solid #fed7aa;
      flex-shrink: 0;
    }
    .photo-label {
      font-size: 0.75rem;
      font-weight: 900;
      color: #c2410c;
    }
    .photo-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #ea580c;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 7px 14px;
      font-size: 0.78rem;
      font-weight: 900;
      cursor: pointer;
      font-family: 'Nanum Gothic', sans-serif;
    }
    .photo-btn:hover { opacity: 0.88; }
    #photoFileInput { display: none; }

    /* 사진 미리보기 */
    .photo-preview {
      max-width: 200px;
      max-height: 160px;
      border-radius: 12px;
      object-fit: cover;
      border: 2px solid #fed7aa;
      margin-top: 6px;
    }

    /* ── 업종 뱃지 ── */
    .industry-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(234,88,12,0.10);
      border: 1px solid rgba(234,88,12,0.25);
      color: #c2410c;
      font-size: 0.72rem;
      font-weight: 900;
      padding: 3px 10px;
      border-radius: 999px;
      margin-left: 8px;
    }

    /* ── 입력 영역 ── */
    .chat-input-area {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      padding: 10px 12px;
      background: #fff;
      border-top: 1px solid #e5e7eb;
      flex-shrink: 0;
    }
    .chat-input {
      flex: 1;
      border: 1.5px solid #e5e7eb;
      border-radius: 14px;
      padding: 10px 14px;
      font-size: 0.90rem;
      font-family: 'Nanum Gothic', sans-serif;
      color: var(--text);
      resize: none;
      outline: none;
      line-height: 1.5;
      max-height: 120px;
      overflow-y: auto;
      transition: border-color 0.15s;
    }
    .chat-input:focus { border-color: var(--orange); }
    .send-btn {
      width: 44px; height: 44px;
      border-radius: 13px;
      background: linear-gradient(135deg, #c2410c, #ea580c);
      border: none;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 6px 16px rgba(234,88,12,0.28);
      transition: opacity .18s, transform .14s;
    }
    .send-btn:hover { opacity: .92; transform: scale(1.05); }
    .send-btn:disabled { opacity: .45; cursor: not-allowed; transform: none; }

    /* ── 타이핑 ── */
    .typing-indicator { display:flex; gap:5px; padding:10px 14px; }
    .typing-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #94a3b8;
      animation: typingBounce 1.2s ease-in-out infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: .2s; }
    .typing-dot:nth-child(3) { animation-delay: .4s; }
    @keyframes typingBounce {
      0%,80%,100% { transform: translateY(0); }
      40% { transform: translateY(-8px); }
    }

    /* ── 퀵버튼 ── */
    .quick-btns { display:flex; flex-wrap:wrap; gap:7px; margin-top:10px; }
    .quick-btn {
      background: #fff7ed;
      border: 1.5px solid #fed7aa;
      border-radius: 999px;
      padding: 6px 13px;
      font-size: 0.78rem;
      font-weight: 900;
      color: #c2410c;
      cursor: pointer;
      font-family: 'Nanum Gothic', sans-serif;
      transition: all .15s;
    }
    .quick-btn:hover { background: #ea580c; color: #fff; border-color: #ea580c; }

    /* ── 면책 ── */
    .disclaimer {
      background: #fff7ed;
      border-top: 1px solid #fed7aa;
      padding: 4px 10px;
      font-size: 0.60rem;
      color: #92400e;
      text-align: center;
      flex-shrink: 0;
      font-weight: 700;
      line-height: 1.4;
    }

    .ai-section {
      margin-top: 10px;
      padding: 10px 12px;
      border-left: 4px solid var(--orange);
      background: #fff7ed;
      border-radius: 10px;
      font-size: 0.82rem;
      border: 1px solid rgba(234,88,12,0.18);
    }
    .ai-title { font-weight: 900; color: #c2410c; margin-bottom: 6px; }
    .hint { color: #334155; font-weight: 800; }
  </style>
</head>

<div class="chat-panel" id="chatPanel">

  <!-- 탭 -->
  <div class="law-tabs" id="lawTabs">
    <button class="law-tab active" onclick="setTab(this, 'all')">전체</button>

    <button class="law-tab" onclick="setTab(this, 'serious')">중대재해법</button>
    <button class="law-tab" onclick="setTab(this, 'industry')">업종별</button>
    <button class="law-tab" onclick="setTab(this, 'photo')">📷 사진분석</button>
  </div>

  <!-- 메시지 -->
  <div class="chat-messages" id="chatMessages">
    <div class="msg bot">
      <div class="msg-avatar">
        <img class="bot-img" id="botFace"

        <div class="msg-bubble">
          안녕하세요! 👋<br>
          저는 <strong>안전관리 AI 어시스턴트 동진이</strong>예요.<br>
          업종과 직책에 맞게 안전 법령을 안내해드릴게요!
          <div class="quick-btns" id="quickBtns">
            <button class="quick-btn" onclick="sendQuick('안전관리자 선임 기준을 알려주세요')">안전관리자 선임</button>
            <button class="quick-btn" onclick="sendQuick('위험성평가 실시 의무는?')">위험성평가</button>
            <button class="quick-btn" onclick="sendQuick('중대재해처벌법 적용 대상은?')">중대재해법</button>
            <button class="quick-btn" onclick="sendQuick('산재 발생 시 사업주 의무는?')">산재 보고</button>
          </div>
        </div>
        <div class="msg-time">지금</div>
      </div>
    </div>
  </div>

  <!-- 사진 분석 바 -->
  <div class="photo-bar" id="photoBar" style="display:none;">
    <span class="photo-label">📷 현장 사진으로 위험성 분석</span>
    <button class="photo-btn" onclick="document.getElementById('photoFileInput').click()">
      📸 사진 선택
    </button>
    <input type="file" id="photoFileInput" accept="image/*" onchange="analyzePhoto(this)">
  </div>

  <!-- 입력 -->
  <div class="chat-input-area">
    <textarea class="chat-input" id="chatInput"
      placeholder="안전 법령, 현장 안전기준 등 무엇이든 물어보세요!" rows="1"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>

  <div class="disclaimer">
    ⚠️ 법적 효력이 있는 전문 법률 조언이 아닙니다. 중요 사안은 전문가(노무사/변호사/공단)와 확인하세요.
  </div>
</div>

  manager_chief: '안전관리책임자',
  manager: '안전관리자',
  supervisor: '관리감독자',
  other: '기타',
};

/* ── 상태 ── */
let userIndustry = 'construction';
let userRole = 'manager';
let currentEmotion = 'default';
let isTyping = false;
let conversationHistory = [];
let currentTab = 'all';

const BOT_FACE = document.getElementById('botFace');
const messages = document.getElementById('chatMessages');
const input = document.getElementById('chatInput');
const sendBtn = document.getElementById('sendBtn');

/* ── Flutter에서 호출: 업종/직책 설정 ── */
function setUserProfile(industry, role) {
  userIndustry = industry || 'construction';
  userRole = role || 'manager';

  // 배지 업데이트
  const cfg = INDUSTRY_CONFIG[userIndustry] || INDUSTRY_CONFIG.other;
  const badge = document.getElementById('industryBadge');
  if (badge) badge.textContent = cfg.emoji + ' ' + cfg.name;

  // 탭 업데이트
  updateTabs();

  // 퀵버튼 업데이트
  updateQuickBtns();

  // 캐릭터 이미지 업데이트 (업종별 다른 이미지 가능)
  setEmotion('default');

  console.log('Profile set:', userIndustry, userRole);
}

/* ── 탭 업데이트 ── */
function updateTabs() {
  const cfg = INDUSTRY_CONFIG[userIndustry] || INDUSTRY_CONFIG.other;
  const tabsEl = document.getElementById('lawTabs');
  tabsEl.innerHTML = `
    <button class="law-tab active" onclick="setTab(this, 'all')">전체</button>
    ${cfg.tabs.map(t => `<button class="law-tab" onclick="setTab(this, '${t.label}')">${t.label}</button>`).join('')}
    <button class="law-tab" onclick="setTab(this, 'photo')">📷 사진분석</button>
  `;
}

/* ── 탭 선택 ── */
function setTab(el, tabId) {
  document.querySelectorAll('.law-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  currentTab = tabId;

  // 사진분석 탭
  const photoBar = document.getElementById('photoBar');
  if (tabId === 'photo') {
    photoBar.style.display = 'flex';
    return;
  }
  photoBar.style.display = 'none';

  // 업종별 퀵버튼
  const cfg = INDUSTRY_CONFIG[userIndustry] || INDUSTRY_CONFIG.other;
  const found = cfg.tabs.find(t => t.label === tabId);
  const qb = document.getElementById('quickBtns');
  if (!qb) return;

  if (found) {
    qb.innerHTML = found.questions.map(q =>
      `<button class="quick-btn" onclick="sendQuick(${JSON.stringify(q)})">${q.length > 18 ? q.slice(0,17)+'…' : q}</button>`
    ).join('');
  } else {
    updateQuickBtns();
  }
}

/* ── 퀵버튼 업데이트 ── */
function updateQuickBtns() {
  const cfg = INDUSTRY_CONFIG[userIndustry] || INDUSTRY_CONFIG.other;
  const qb = document.getElementById('quickBtns');
  if (!qb) return;
  qb.innerHTML = cfg.quickBtns.map((label, i) =>
    `<button class="quick-btn" onclick="sendQuick(${JSON.stringify(cfg.prompts[i])})">${label}</button>`
  ).join('');
}

/* ── 감정 설정 ── */
function setEmotion(type) {
  currentEmotion = type;
  BOT_FACE.src = BOT_BASE + 'dj-ai-' + type + '.png';
}

/* ── 시간 ── */
function nowTime() {
  return new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
}

/* ── HTML escape ── */
function escapeHtml_(s) {
  return String(s)
    .replaceAll('&','&amp;').replaceAll('<','&lt;')
    .replaceAll('>','&gt;').replaceAll('"','&quot;')
    .replaceAll("'","&#39;");
}

/* ── 메시지 추가 ── */
function appendMessage(role, html, lawCards) {
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;

  const cfg = INDUSTRY_CONFIG[userIndustry] || INDUSTRY_CONFIG.other;
  const roleName = ROLE_CONFIG[userRole] || '안전관리자';

  let avatarHtml = role === 'bot'
    ? `<div class="msg-avatar"><img src="${BOT_BASE}dj-ai-${currentEmotion}.png" alt="동진이"></div>`
    : `<div class="msg-avatar">👷</div>`;

  let cardsHtml = '';
  if (Array.isArray(lawCards) && lawCards.length > 0) {
    cardsHtml = `<div class="law-cards">` + lawCards.map(c => `
      <div class="law-card">
        <span class="law-card-badge">📋 관련법령</span>
        <div class="law-card-title">${escapeHtml_(c.name || '')}</div>
        ${c.desc ? `<div class="law-card-desc">${escapeHtml_(c.desc)}</div>` : ''}
        ${c.url ? `<a class="law-card-link" href="${c.url}" target="_blank" rel="noopener">🔗 법령 전문 보기 →</a>` : ''}
      </div>
    `).join('') + `</div>`;
  }

  const name = role === 'bot'
    ? `동진이 <span class="industry-badge">${cfg.emoji} ${cfg.name}</span>`
    : roleName;

  wrap.innerHTML = `
    ${avatarHtml}
    <div class="msg-content">
      <span class="msg-name">${name}</span>
      <div class="msg-bubble">${html}</div>
      ${cardsHtml}
      <div class="msg-time">${nowTime()}</div>
    </div>
  `;

  messages.appendChild(wrap);
  messages.scrollTop = messages.scrollHeight;
}

/* ── 타이핑 표시 ── */
function showTyping() {
  const d = document.createElement('div');
  d.className = 'msg bot';
  d.id = 'typingMsg';
  d.innerHTML = `
    <div class="msg-avatar"><img src="${BOT_BASE}dj-ai-thinking.png" alt="동진이"></div>
    <div class="msg-content">
      <span class="msg-name">동진이</span>
      <div class="typing-indicator">
        <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
      </div>
    </div>
  `;
  messages.appendChild(d);
  messages.scrollTop = messages.scrollHeight;
}

function hideTyping() {
  const t = document.getElementById('typingMsg');
  if (t) t.remove();
}

/* ── 감정 자동 판단 ── */
function applyEmotionByText(reply) {
  const danger = ["징역","벌금","처벌","과태료","위반","형사","벌칙","행정처분","영업정지"];
  setEmotion(danger.some(w => reply.includes(w)) ? "warning" : "default");
}

/* ── HTML 래핑 ── */
function toReportStyleHtml_(rawText) {
  const looksHtml = /<\/?(div|br|strong|span|a|ul|li|p)\b/i.test(rawText);
  if (looksHtml) return rawText;
  const safe = escapeHtml_(rawText).replace(/\n/g,'<br>');
  return `<div class="ai-section"><div class="ai-title">🧾 답변</div><div class="hint">${safe}</div></div>`;
}

/* ── 퀵 전송 ── */
function sendQuick(text) {
  input.value = text;
  input.dispatchEvent(new Event('input'));
  sendMessage();
}

/* ── Enter 전송 ── */
input.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});

/* ── 사진 분석 ── */
async function analyzePhoto(input_el) {
  const file = input_el.files[0];
  if (!file) return;

  // 미리보기
  const reader = new FileReader();
  reader.onload = async function(e) {
    const base64 = e.target.result;
    const imgHtml = `<img src="${base64}" class="photo-preview"><br>📷 현장 사진을 분석하고 있어요...`;
    appendMessage('user', imgHtml);

    setEmotion('thinking');
    showTyping();

    const cfg = INDUSTRY_CONFIG[userIndustry] || INDUSTRY_CONFIG.other;
    const roleName = ROLE_CONFIG[userRole] || '안전관리자';

    try {
      const payload = {
        question: `[사진 위험성 분석 요청] 업종: ${cfg.name}, 직책: ${roleName}. 첨부된 현장 사진을 분석하여 위험 요소, 법적 위반 사항, 개선 조치를 안전 법령 기준으로 설명해주세요.`,
        history: conversationHistory,
        imageBase64: base64.split(',')[1],
        imageMimeType: file.type,
        industry: userIndustry,
        role: userRole,
      };

      const res = await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(payload),
      });

      const textBody = await res.text();
      let data = null;
      try { data = JSON.parse(textBody); } catch(_) { data = { reply: textBody, laws: [] }; }

      hideTyping();
      const reply = data.reply || data.answer || '분석 결과를 받아오지 못했습니다.';
      applyEmotionByText(reply);
      appendMessage('bot', toReportStyleHtml_(reply), data.laws || []);

    } catch(err) {
      hideTyping();
      setEmotion('error');
      appendMessage('bot', '❌ 사진 분석 중 오류가 발생했습니다.');
    }

    input_el.value = '';
  };
  reader.readAsDataURL(file);
}

/* ── 메시지 전송 ── */
async function sendMessage() {
  const text = input.value.trim();
  if (!text || isTyping) return;

  appendMessage('user', escapeHtml_(text).replace(/\n/g,'<br>'));
  conversationHistory.push({ role: 'user', content: text });

  input.value = '';
  input.style.height = 'auto';
  sendBtn.disabled = true;
  isTyping = true;
  setEmotion('thinking');
  showTyping();

  const cfg = INDUSTRY_CONFIG[userIndustry] || INDUSTRY_CONFIG.other;
  const roleName = ROLE_CONFIG[userRole] || '안전관리자';

  try {
    const payload = {
      question: text,
      history: conversationHistory,
      industry: userIndustry,
      industryName: cfg.name,
      role: userRole,
      roleName: roleName,
    };

    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(payload),
    });

    const textBody = await res.text();
    let data = null;
    try { data = JSON.parse(textBody); } catch(_) { data = { reply: textBody, laws: [] }; }

    hideTyping();
    const ok = data && (data.reply || data.answer);
    if (!ok) {
      setEmotion('error');
      appendMessage('bot', `❌ 서버 오류: ${escapeHtml_(data?.error || '응답 형식 오류')}`);
      sendBtn.disabled = false;
      isTyping = false;
      return;
    }

    const reply = data.reply || data.answer;
    const laws = Array.isArray(data.laws) ? data.laws : [];
    applyEmotionByText(reply);
    conversationHistory.push({ role: 'assistant', content: reply });
    appendMessage('bot', toReportStyleHtml_(reply), laws);

  } catch(err) {
    hideTyping();
    setEmotion('error');
    appendMessage('bot', '❌ 서버 연결 오류가 발생했습니다.');
  }

  sendBtn.disabled = false;
  isTyping = false;
}

/* ── FlutterBridge (앱에서 메시지 카운트용) ── */
function notifyMessageSent() {
  if (window.FlutterBridge) {
    window.FlutterBridge.postMessage('message_sent');
  }
}

/* ── 초기화 ── */
setEmotion('default');
updateTabs();
updateQuickBtns();
</script>
</body>
</html>
