<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>동진이 - 안전관리 AI 어시스턴트</title>
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&family=Gmarket+Sans:wght@300;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --orange: #ea580c;
      --navy: #0b1b3b;
      --bg: #f8fafc;
      --panel: #ffffff;
      --text: #1e293b;
      --muted: #64748b;
    }
    * {
      margin:0; padding:0; box-sizing:border-box;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }
    body {
      font-family: 'Nanum Gothic', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }
    @supports (padding-bottom: env(safe-area-inset-bottom)) {
      .disclaimer { padding-bottom: calc(4px + env(safe-area-inset-bottom)); }
    }
    .chat-panel {
      width: 100vw; height: 100vh;
      background: var(--panel);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .law-tabs {
      display: flex; overflow-x: auto;
      background: #f8fafc; border-bottom: 1px solid #e5e7eb;
      flex-shrink: 0; padding: 0 6px;
    }
    .law-tabs::-webkit-scrollbar { height: 0; }
    .law-tab {
      padding: 10px 13px; font-size: 0.74rem; font-weight: 900;
      white-space: nowrap; cursor: pointer; color: var(--muted);
      border: none; border-bottom: 2px solid transparent;
      background: none; transition: all 0.15s;
      font-family: 'Nanum Gothic', sans-serif;
    }
    .law-tab:hover { color: var(--orange); }
    .law-tab.active { color: var(--orange); border-bottom-color: var(--orange); }
    .chat-messages {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 14px;
      background: #f8fafc; scroll-behavior: smooth;
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
    .msg { display:flex; gap: 10px; align-items:flex-end; }
    .msg.user { flex-direction: row-reverse; }
    .msg-avatar {
      background: none; box-shadow: none; width: 70px;
      display: flex; align-items: flex-end; justify-content: center; flex-shrink: 0;
    }
    .msg-avatar img {
      width: 80px; height: auto; object-fit: contain;
      filter: drop-shadow(0 6px 10px rgba(0,0,0,.20)); transition: transform .2s ease;
    }
    .msg.bot .msg-avatar img { transform: scale(1.05); }
    .msg.user .msg-avatar {
      width: 36px; height: 36px; border-radius: 12px;
      background: #e5e7eb; color: #111827; font-size: 0.95rem; font-weight: 900;
      display: flex; align-items: center; justify-content: center;
    }
    .msg-content { max-width: 80%; display:flex; flex-direction:column; gap: 5px; }
    .msg.user .msg-content { align-items: flex-end; }
    .msg-name { font-size: 0.70rem; font-weight: 900; color: #6b7280; }
    .msg-bubble {
      position: relative; padding: 12px 14px; border-radius: 16px;
      font-size: 0.90rem; line-height: 1.65; word-break: keep-all;
      box-shadow: 0 10px 22px rgba(0,0,0,0.06);
    }
    .msg.bot .msg-bubble {
      background: #ffffff; color: var(--text);
      border-bottom-left-radius: 4px; border: 1px solid rgba(15,23,42,0.06);
    }
    .msg.bot .msg-bubble::after {
      content: ""; position: absolute; left: -10px; top: 18px;
      border-width: 8px; border-style: solid;
      border-color: transparent #ffffff transparent transparent;
    }
    .msg.user .msg-bubble {
      background: linear-gradient(135deg, #c2410c, #ea580c); color: #fff;
      border-bottom-right-radius: 4px; box-shadow: 0 12px 24px rgba(234,88,12,0.20);
    }
    .msg.user .msg-bubble::after {
      content: ""; position: absolute; right: -10px; top: 18px;
      border-width: 8px; border-style: solid;
      border-color: transparent transparent transparent #ea580c;
    }
    .msg-time { font-size: 0.68rem; color: #9ca3af; padding: 0 4px; font-weight: 800; }
    .law-cards { display:flex; flex-direction:column; gap: 8px; margin-top: 8px; }
    .law-card {
      background: #fff; border: 1px solid #fed7aa;
      border-left: 4px solid var(--orange); border-radius: 12px; padding: 10px 12px;
    }
    .law-card-badge {
      display: inline-block; background: rgba(234,88,12,0.10); color: var(--orange);
      font-size: 0.70rem; font-weight: 900; padding: 2px 8px;
      border-radius: 999px; margin-bottom: 6px;
    }
    .law-card-title { font-size: 0.82rem; font-weight: 900; color: #1e293b; margin-bottom: 4px; }
    .law-card-desc { font-size: 0.78rem; color: #64748b; line-height: 1.5; margin-bottom: 6px; }
    .law-card-link { font-size: 0.75rem; color: var(--orange); font-weight: 900; text-decoration: none; }
    .law-search-btns { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 8px; }
    .law-search-label { width: 100%; font-size: 0.72rem; font-weight: 900; color: #64748b; margin-bottom: 2px; }
    .law-search-btn {
      margin-top: 0px; display: inline-flex; align-items: center; gap: 5px;
      background: #fff7ed; border: 1.5px solid #fed7aa; border-radius: 999px;
      padding: 5px 12px; font-size: 0.75rem; font-weight: 900; color: #c2410c;
      cursor: pointer; font-family: 'Nanum Gothic', sans-serif; transition: all .15s;
    }
    .law-search-btn:hover { background: #ea580c; color: #fff; border-color: #ea580c; }
    .photo-bar {
      display: flex; align-items: center; gap: 8px; padding: 8px 12px;
      background: #fff7ed; border-top: 1px solid #fed7aa; flex-shrink: 0;
    }
    .photo-label { font-size: 0.75rem; font-weight: 900; color: #c2410c; }
    .photo-btn {
      display: flex; align-items: center; gap: 6px; background: #ea580c;
      color: white; border: none; border-radius: 10px; padding: 7px 14px;
      font-size: 0.78rem; font-weight: 900; cursor: pointer; font-family: 'Nanum Gothic', sans-serif;
    }
    .photo-btn:hover { opacity: 0.88; }
    #photoFileInput { display: none; }
    .photo-preview {
      max-width: 200px; max-height: 160px; border-radius: 12px;
      object-fit: cover; border: 2px solid #fed7aa; margin-top: 6px;
    }
    .industry-badge {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(234,88,12,0.10); border: 1px solid rgba(234,88,12,0.25);
      color: #c2410c; font-size: 0.72rem; font-weight: 900;
      padding: 3px 10px; border-radius: 999px; margin-left: 8px;
    }
    .chat-input-area {
      display: flex; align-items: flex-end; gap: 10px; padding: 10px 12px;
      background: #fff; border-top: 1px solid #e5e7eb; flex-shrink: 0;
    }
    .chat-input {
      flex: 1; border: 1.5px solid #e5e7eb; border-radius: 14px;
      padding: 10px 14px; font-size: 0.90rem; font-family: 'Nanum Gothic', sans-serif;
      color: var(--text); resize: none; outline: none; line-height: 1.5;
      max-height: 120px; overflow-y: auto; transition: border-color 0.15s;
    }
    .chat-input:focus { border-color: var(--orange); }
    .send-btn {
      width: 44px; height: 44px; border-radius: 13px;
      background: linear-gradient(135deg, #c2410c, #ea580c);
      border: none; color: #fff; cursor: pointer;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      box-shadow: 0 6px 16px rgba(234,88,12,0.28); transition: opacity .18s, transform .14s;
    }
    .send-btn:hover { opacity: .92; transform: scale(1.05); }
    .send-btn:disabled { opacity: .45; cursor: not-allowed; transform: none; }
    .photo-attach-btn {
      width: 44px; height: 44px; border-radius: 13px;
      background: #fff7ed; border: 1.5px solid #fed7aa;
      color: #ea580c; font-size: 1.2rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .15s;
    }
    .photo-attach-btn:hover { background: #ea580c; border-color: #ea580c; }
    .typing-indicator { display:flex; gap:5px; padding:10px 14px; }
    .typing-dot {
      width: 8px; height: 8px; border-radius: 50%; background: #94a3b8;
      animation: typingBounce 1.2s ease-in-out infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: .2s; }
    .typing-dot:nth-child(3) { animation-delay: .4s; }
    @keyframes typingBounce {
      0%,80%,100% { transform: translateY(0); }
      40% { transform: translateY(-8px); }
    }
    .quick-btns { display:flex; flex-wrap:wrap; gap:7px; margin-top:10px; }
    .quick-btn {
      background: #fff7ed; border: 1.5px solid #fed7aa; border-radius: 999px;
      padding: 6px 13px; font-size: 0.78rem; font-weight: 900; color: #c2410c;
      cursor: pointer; font-family: 'Nanum Gothic', sans-serif; transition: all .15s;
    }
    .quick-btn:hover { background: #ea580c; color: #fff; border-color: #ea580c; }
    .disclaimer {
      background: #fff7ed; border-top: 1px solid #fed7aa; padding: 3px 10px;
      font-size: 0.58rem; color: #92400e; text-align: center; flex-shrink: 0;
      font-weight: 700; line-height: 1.3;
    }
    .ai-section {
      margin-top: 10px; padding: 10px 12px; border-left: 4px solid var(--orange);
      background: #fff7ed; border-radius: 10px; font-size: 0.82rem;
      border: 1px solid rgba(234,88,12,0.18);
    }
    .ai-title { font-weight: 900; color: #c2410c; margin-bottom: 6px; }
    .hint { color: #334155; font-weight: 800; }
  </style>
</head>
<body>
<div class="chat-panel" id="chatPanel">

  <div class="law-tabs" id="lawTabs">
    <button class="law-tab active" onclick="setTab(this, 'all')">전체</button>
    <button class="law-tab" onclick="setTab(this, '산안법')">산안법</button>
    <button class="law-tab" onclick="setTab(this, '중대재해법')">중대재해법</button>
    <button class="law-tab" onclick="setTab(this, '업종별')">업종별</button>
    <button class="law-tab" onclick="setTab(this, 'photo')">📷 사진분석</button>
  </div>

  <div class="chat-messages" id="chatMessages">
    <div class="msg bot" id="greetingMsg">
      <div class="msg-avatar">
        <img class="bot-img" id="botFace"
             src="https://raw.githubusercontent.com/es1063122-creator/legal-app/main/dj-ai-default.png"
             alt="동진이">
      </div>
      <div class="msg-content">
        <span class="msg-name" id="greetingName">동진이 <span class="industry-badge" id="industryBadge">🏗 건설업</span></span>
        <div class="msg-bubble" id="greetingBubble">
          안녕하세요! 👋<br>
          저는 <strong>안전관리 AI 어시스턴트 동진이</strong>예요.<br>
          업종과 직책에 맞게 안전 법령을 안내해드릴게요!
          <div class="quick-btns" id="quickBtns">
            <button class="quick-btn" onclick="sendQuick('안전관리자 선임 기준을 알려주세요')">안전관리자 선임</button>
            <button class="quick-btn" onclick="sendQuick('위험성평가 실시 의무는?')">위험성평가</button>
            <button class="quick-btn" onclick="sendQuick('중대재해처벌법 적용 대상은?')">중대재해법</button>
            <button class="quick-btn" onclick="sendQuick('산재 발생 시 사업주 의무는?')">산재 보고</button>
          </div>
        </div>
        <div class="msg-time" id="greetingTime">지금</div>
      </div>
    </div>
  </div>

  <div class="photo-bar" id="photoBar" style="display:none;">
    <span class="photo-label" id="photoBarLabel">📷 현장 사진으로 위험성 분석</span>
    <button class="photo-btn" type="button" onclick="requestPhotoFromFlutter()">
      📸 <span id="photoBarBtnText">사진 선택</span>
    </button>
  </div>

  <div class="chat-input-area">
    <button class="photo-attach-btn" type="button" onclick="requestPhotoFromFlutter()" title="사진 첨부">
      📷
    </button>
    <textarea class="chat-input" id="chatInput"
      placeholder="질문하거나 현장 사진을 첨부해보세요!" rows="1"></textarea>
    <button class="send-btn" id="sendBtn" type="button" onclick="sendMessage()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>

  <div class="disclaimer" id="disclaimerText">
    ⚠️ 법적 효력이 있는 전문 법률 조언이 아닙니다. 중요 사안은 전문가(노무사/변호사/공단)와 확인하세요.
  </div>
</div>

function updateTabs() {
  const cfg = INDUSTRY_CONFIG[userIndustry] || INDUSTRY_CONFIG.other;
  const tabsEl = document.getElementById('lawTabs');
  tabsEl.innerHTML = `
    <button class="law-tab active" onclick="setTab(this, 'all')">전체</button>
    ${cfg.tabs.map(function(t) {
      return '<button class="law-tab" onclick="setTab(this, \'' + t.label + '\')">' + t.label + '</button>';
    }).join('')}
    <button class="law-tab" onclick="setTab(this, 'photo')">📷 사진분석</button>
  `;
  currentTab = 'all';
}

function setTab(el, tabId) {
  document.querySelectorAll('.law-tab').forEach(function(t) { t.classList.remove('active'); });
  el.classList.add('active');
  currentTab = tabId;
  const photoBar = document.getElementById('photoBar');
  if (tabId === 'photo') { photoBar.style.display = 'flex'; return; }
  photoBar.style.display = 'none';
  const cfg = INDUSTRY_CONFIG[userIndustry] || INDUSTRY_CONFIG.other;
  const found = cfg.tabs.find(function(t) { return t.label === tabId; });
  const qb = document.getElementById('quickBtns');
  if (!qb) return;
  if (found) {
    qb.innerHTML = found.questions.map(function(q) {
      const shortLabel = q.length > 18 ? q.slice(0, 17) + '…' : q;
      return '<button class="quick-btn" onclick=\'sendQuick(' + JSON.stringify(q) + ')\'>' + shortLabel + '</button>';
    }).join('');
  } else { updateQuickBtns(); }
}

function updateQuickBtns() {
  const cfg = INDUSTRY_CONFIG[userIndustry] || INDUSTRY_CONFIG.other;
  const qb = document.getElementById('quickBtns');
  if (!qb) return;
  qb.innerHTML = cfg.quickBtns.map(function(label, i) {
    return '<button class="quick-btn" onclick=\'sendQuick(' + JSON.stringify(cfg.prompts[i]) + ')\'>' + label + '</button>';
  }).join('');
}

    overlay.innerHTML = `
      <div style="background:#fff;border-radius:20px;padding:24px;max-width:320px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.3);">
        <div style="font-size:1rem;font-weight:900;color:#0f172a;margin-bottom:6px;">${ui.analysisTitle}</div>
        <div style="font-size:0.82rem;color:#64748b;margin-bottom:20px;">${ui.analysisSubtitle}</div>
        <button id="btnSafety" style="width:100%;padding:14px;border-radius:14px;border:2px solid #e5e7eb;background:#fff;font-size:0.9rem;font-weight:900;color:#0f172a;cursor:pointer;margin-bottom:10px;text-align:left;">
          ${ui.safetyBtn}<br><span style="font-size:0.78rem;font-weight:400;color:#64748b;">${ui.safetyDesc}</span>
        </button>
        <button id="btnRisk" style="width:100%;padding:14px;border-radius:14px;border:2px solid #e5e7eb;background:#fff;font-size:0.9rem;font-weight:900;color:#0f172a;cursor:pointer;text-align:left;">
          ${ui.riskBtn}<br><span style="font-size:0.78rem;font-weight:400;color:#64748b;">${ui.riskDesc}</span>
        </button>
      </div>
    `;
    document.body.appendChild(overlay);
    overlay.querySelector('#btnSafety').addEventListener('click', function() { document.body.removeChild(overlay); resolve('safety'); });
    overlay.querySelector('#btnRisk').addEventListener('click', function() { document.body.removeChild(overlay); resolve('risk'); });
  });
}

    : '<div class="msg-avatar">👷</div>';
  let cardsHtml = '';
  if (Array.isArray(lawCards) && lawCards.length > 0) {
    cardsHtml = '<div class="law-search-btns">' +
      '<div class="law-search-label">' + ui.lawSearchLabel + '</div>' +
      lawCards.map(function(kw) {
        return '<button class="law-search-btn" data-law="' + escapeHtml_(kw) + '">🔍 ' + escapeHtml_(kw) + '</button>';
      }).join('') + '</div>';
  }
  const name = role === 'bot'
    ? ui.botName + ' <span class="industry-badge">' + cfg.emoji + ' ' + cfg.name + '</span>'
    : roleName;
  wrap.innerHTML = `
    ${avatarHtml}
    <div class="msg-content">
      <span class="msg-name">${name}</span>
      <div class="msg-bubble">${html}</div>
      ${cardsHtml}
      <div class="msg-time">${nowTime()}</div>
    </div>
  `;
  wrap.querySelectorAll('.law-search-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      const lawName = btn.getAttribute('data-law');
      if (lawName) searchInApp(lawName);
    });
  });
  messages.appendChild(wrap);
  messages.scrollTop = messages.scrollHeight;
}

function showTyping() {
  const ui = getUI(_currentLang);
  const d = document.createElement('div');
  d.className = 'msg bot'; d.id = 'typingMsg';
  d.innerHTML = `
    <div class="msg-avatar"><img src="${BOT_BASE}dj-ai-thinking.png" alt="bot"></div>
    <div class="msg-content">
      <span class="msg-name">${ui.typingName}</span>
      <div class="typing-indicator">
        <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
      </div>
    </div>
  `;
  messages.appendChild(d);
  messages.scrollTop = messages.scrollHeight;
}

function hideTyping() {
  const t = document.getElementById('typingMsg');
  if (t) t.remove();
}

function applyEmotionByText(reply) {
  const danger = ['징역','벌금','처벌','과태료','위반','형사','벌칙','행정처분','영업정지','송치','기소','penalty','violation','fine','punishment'];
  const isWarning = danger.some(function(w) { return String(reply).toLowerCase().includes(w); });
  setEmotion(isWarning ? 'warning' : 'default');
}

function toReportStyleHtml_(rawText) {
  const ui = getUI(_currentLang);
  const looksHtml = /<\/?(div|br|strong|span|a|ul|li|p|em|code)\b/i.test(rawText);
  if (looksHtml) return rawText;
  const safe = escapeHtml_(rawText).replace(/\n/g, '<br>');
  return '<div class="ai-section"><div class="ai-title">' + ui.answerTitle + '</div><div class="hint">' + safe + '</div></div>';
}

function buildPrompt(template, industryName, roleName) {
  return template.replace('{industry}', industryName).replace('{role}', roleName);
}

function sendQuick(text) {
  input.value = text;
  input.dispatchEvent(new Event('input'));
  sendMessage();
}

input.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
input.addEventListener('input', function() {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});

// ── 사진 분석 (Flutter에서 base64로 직접 전달) ───────────────
async function analyzePhotoFromFlutter(base64Str, mimeType, analysisType, workDesc) {
  const ui = getUI(_currentLang);
  const analysisLabel = analysisType === 'risk' ? ui.riskLabel : ui.safetyLabel;
  const dataUrl = 'data:' + mimeType + ';base64,' + base64Str;
  appendMessage('user', '<img src="' + dataUrl + '" class="photo-preview"><br>📷 ' + analysisLabel);

  sendBtn.disabled = true;
  isTyping = true;
  setEmotion('thinking');
  showTyping();

  const cfg = INDUSTRY_CONFIG[userIndustry] || INDUSTRY_CONFIG.other;
  const roleName = ROLE_CONFIG[userRole] || '안전관리자';

  try {
    const promptTemplate = analysisType === 'risk' ? ui.riskPrompt : ui.safetyPrompt;
    let question = buildPrompt(promptTemplate, cfg.name, roleName);
    if (workDesc) question += ' 작업내용: ' + workDesc;
    question += ui.langInstruction;

    const payload = {
      question: question,
      history: conversationHistory,
      imageBase64: base64Str,
      imageMimeType: mimeType || 'image/jpeg',
      industry: userIndustry,
      industryName: cfg.name,
      role: userRole,
      roleName: roleName,
      lang: _currentLang
    };

    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(payload)
    });

    const textBody = await res.text();
    let data = null;
    try { data = JSON.parse(textBody); } catch(_) { data = { reply: textBody, laws: [] }; }

    hideTyping();
    const reply = data.reply || data.answer || ui.noResult;
    let keywords = [];
    if (Array.isArray(data.searchKeywords) && data.searchKeywords.length > 0) keywords = data.searchKeywords;
    else if (Array.isArray(data.laws) && data.laws.length > 0) keywords = data.laws.map(function(l) { return l.name || ''; }).filter(Boolean);

    applyEmotionByText(reply);
    appendMessage('bot', toReportStyleHtml_(reply), keywords);
    conversationHistory.push({ role: 'assistant', content: reply });

  } catch(err) {
    hideTyping(); setEmotion('error');
    appendMessage('bot', ui.errPhoto);
  }

  sendBtn.disabled = false;
  isTyping = false;
}

// ── 기존 파일input 방식 사진 분석 (브라우저 fallback) ─────────
async function analyzePhoto(inputEl) {
  const file = inputEl.files[0];
  if (!file || isTyping) return;
  const ui = getUI(_currentLang);

  const reader = new FileReader();
  reader.onload = async function(e) {
    const base64Url = e.target.result;
    const pureBase64 = String(base64Url).split(',')[1] || '';
    const analysisType = await showAnalysisTypeDialog();
    const analysisLabel = analysisType === 'risk' ? ui.riskLabel : ui.safetyLabel;
    appendMessage('user', '<img src="' + base64Url + '" class="photo-preview"><br>📷 ' + analysisLabel);

    sendBtn.disabled = true;
    isTyping = true;
    setEmotion('thinking');
    showTyping();

    const cfg = INDUSTRY_CONFIG[userIndustry] || INDUSTRY_CONFIG.other;
    const roleName = ROLE_CONFIG[userRole] || '안전관리자';

    try {
      const promptTemplate = analysisType === 'risk' ? ui.riskPrompt : ui.safetyPrompt;
      const question = buildPrompt(promptTemplate, cfg.name, roleName) + ui.langInstruction;

      const payload = {
        question: question,
        history: conversationHistory,
        imageBase64: pureBase64,
        imageMimeType: file.type || 'image/jpeg',
        industry: userIndustry,
        industryName: cfg.name,
        role: userRole,
        roleName: roleName,
        lang: _currentLang
      };

      const res = await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(payload)
      });

      const textBody = await res.text();
      let data = null;
      try { data = JSON.parse(textBody); } catch(_) { data = { reply: textBody, laws: [] }; }

      hideTyping();
      const reply = data.reply || data.answer || ui.noResult;
      let keywords = [];
      if (Array.isArray(data.searchKeywords) && data.searchKeywords.length > 0) keywords = data.searchKeywords;
      else if (Array.isArray(data.laws) && data.laws.length > 0) keywords = data.laws.map(function(l) { return l.name || ''; }).filter(Boolean);

      applyEmotionByText(reply);
      appendMessage('bot', toReportStyleHtml_(reply), keywords);
      conversationHistory.push({ role: 'assistant', content: reply });

    } catch(err) {
      hideTyping(); setEmotion('error');
      appendMessage('bot', ui.errPhoto);
    }

    sendBtn.disabled = false;
    isTyping = false;
    inputEl.value = '';
  };
  reader.readAsDataURL(file);
}

// ── 텍스트 전송 ──────────────────────────────────────────────
async function sendMessage() {
  const text = input.value.trim();
  if (!text || isTyping) return;
  const ui = getUI(_currentLang);

  appendMessage('user', escapeHtml_(text).replace(/\n/g, '<br>'));
  conversationHistory.push({ role: 'user', content: text });

  input.value = '';
  input.style.height = 'auto';
  sendBtn.disabled = true;
  isTyping = true;
  setEmotion('thinking');
  showTyping();

  const cfg = INDUSTRY_CONFIG[userIndustry] || INDUSTRY_CONFIG.other;
  const roleName = ROLE_CONFIG[userRole] || '안전관리자';

  // ★ 언어 지시를 질문에 자동 추가
  const questionWithLang = text + ui.langInstruction;

  try {
    const payload = {
      question: questionWithLang,
      history: conversationHistory,
      industry: userIndustry,
      industryName: cfg.name,
      role: userRole,
      roleName: roleName,
      lang: _currentLang
    };

    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(payload)
    });

    const textBody = await res.text();
    let data = null;
    try { data = JSON.parse(textBody); } catch(_) { data = { reply: textBody, laws: [] }; }

    hideTyping();
    const ok = data && (data.reply || data.answer);
    if (!ok) {
      setEmotion('error');
      appendMessage('bot', ui.errServer + ': ' + escapeHtml_(data && data.error ? data.error : '응답 형식 오류'));
      sendBtn.disabled = false; isTyping = false; return;
    }

    const reply = data.reply || data.answer;
    let keywords = [];
    if (Array.isArray(data.searchKeywords) && data.searchKeywords.length > 0) keywords = data.searchKeywords;
    else if (Array.isArray(data.laws) && data.laws.length > 0) keywords = data.laws.map(function(l) { return l.name || ''; }).filter(Boolean);

    applyEmotionByText(reply);
    conversationHistory.push({ role: 'assistant', content: reply });
    appendMessage('bot', toReportStyleHtml_(reply), keywords);

  } catch(err) {
    hideTyping(); setEmotion('error');
    appendMessage('bot', ui.errConn);
  }

  sendBtn.disabled = false;
  isTyping = false;

  if (window.FlutterBridge && typeof window.FlutterBridge.postMessage === 'function') {
    window.FlutterBridge.postMessage('MESSAGE_SENT');
  }
}

function notifyMessageSent() {
  if (window.FlutterBridge && typeof window.FlutterBridge.postMessage === 'function') {
    window.FlutterBridge.postMessage('message_sent');
  }
}

setEmotion('default');
updateTabs();
updateQuickBtns();
</script>
