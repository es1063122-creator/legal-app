name: 법제처 안전 법령 자동 수집

on:
  schedule:
    - cron: '0 0 * * *'  # 매일 오전 9시 (UTC 0시 = KST 9시)
  workflow_dispatch:       # 수동 실행 버튼

jobs:
  fetch-laws:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 고시·예규·훈령 자동 수집
        env:
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
          LAW_OC: ${{ secrets.LAW_OC }}
        run: python fetch_laws.py

      - name: 별표·서식 자동 수집
        env:
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
          LAW_OC: ${{ secrets.LAW_OC }}
        run: python fetch_byeolpyo.py
