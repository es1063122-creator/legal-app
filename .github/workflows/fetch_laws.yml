name: 법제처 안전 법령 자동 수집

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  fetch-laws:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 파일 확인
        run: |
          echo "=== fetch_laws.py 내용 확인 ==="
          head -50 fetch_laws.py

      - name: 고시·예규·훈령 자동 수집
        env:
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
          LAW_OC: ${{ secrets.LAW_OC }}
        run: python fetch_laws.py

      - name: 별표·서식 자동 수집
        env:
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
          LAW_OC: ${{ secrets.LAW_OC }}
        run: python fetch_byeolpyo.py
